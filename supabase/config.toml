# NicheSignal — projet Supabase SÉPARÉ de Slidy
# Documentation: https://supabase.com/docs/guides/cli/config
# Lier avec: supabase link --project-ref <REF_DU_PROJET_NICHE_SIGNAL>

project_id = "niche-signal"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
enabled = true

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3002"
additional_redirect_urls = ["http://localhost:3002/**"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
